<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Zeka mükemmeliyetsizliği</title>
    <meta name="description" content="NexusAI, modern ve gelişmiş bir kumru alternatifidir.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Background Elements for Aesthetics -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ph-fill ph-planet"></i>
                    <h1>NexusAI</h1>
                </div>
            </div>

            <button class="new-chat-btn">
                <i class="ph ph-plus"></i>
                <span>Yeni Sohbet</span>
            </button>

            <div class="history-container">
                <h2 class="history-title">Geçmiş</h2>
                <ul class="history-list">
                    <li class="history-item active">
                        <i class="ph ph-chat-teardrop-text"></i>
                        <span>Yeni Sohbet</span>
                    </li>
                </ul>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Kullanici&background=random&color=fff" alt="User Avatar"
                        class="avatar">
                    <div class="user-info">
                        <span class="user-name">AcimAI Ultra</span>
                        <span class="user-plan">Ultra Plan</span>
                    </div>
                    <i class="ph ph-gear settings-icon" id="settings-btn"></i>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="header-info">
                    <span class="model-badge">Nexus-5.4 AcimAI special araklanmis edition</span>
                </div>
                <div class="header-actions">
                    <button class="action-btn" title="Paylaş"><i class="ph ph-share-network"></i></button>
                    <button class="action-btn" title="Dışa Aktar"><i class="ph ph-download-simple"></i></button>
                </div>
            </header>

            <div class="messages-container" id="messages-container">
                <!-- Welcome Message -->
                <div class="message ai-message welcome-message">
                    <div class="message-avatar">
                        <i class="ph-fill ph-planet"></i>
                    </div>
                    <div class="message-content">
                        <h2>Merhaba, ben NexusAI.</h2>
                        <p>Ben bir Kumrunun aşırı kafasız versiyonuyum.</p>

                        <div class="suggestions">
                            <button class="suggestion-btn">Atatürk samsun'a hangi araçla gitmiştir</button>
                            <button class="suggestion-btn">Kumru'da kaç adet pilav tanesi bulunur</button>
                            <button class="suggestion-btn">Yeni bir iş fikri bul</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <button class="attach-btn"><i class="ph ph-paperclip"></i></button>
                    <textarea id="chat-input" placeholder="NexusAI'a mesaj gönder..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn"><i class="ph-fill ph-paper-plane-right"></i></button>
                </div>
                <div class="input-footer">
                    NexusAI HEP HATA YAPAR. BİLMEDİĞİNİZ İŞLER İÇİN KULLANMAYIN. ÇÜNKÜ ÇOK SALAK.
                </div>
            </div>
        </main>
    </div>



    <!-- Script -->
    <script src="script.js"></script>
</body>

</html>
